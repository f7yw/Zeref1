providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "20"
NPM_CONFIG_PRODUCTION = "false"
NPM_CONFIG_AUDIT = "false"
NPM_CONFIG_FUND = "false"

[phases.setup]
nixPkgs = ["...", "python3", "ffmpeg", "gcc", "pkg-config", "libvips"]

[phases.install]
cmds = [
  "corepack enable",
  "pnpm install --frozen-lockfile --prod=false",
  "pip3 install yt-dlp"
]

[start]
cmd = "node index.js"
